name: CI

on:
  pull_request:
    branches: [dev, master, main]
  push:
    branches: [dev, master, main]
  workflow_dispatch:

# One run per ref; new pushes cancel superseded runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-plugin:
    name: Validate plugin & manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml
      - name: Validate plugin / marketplace JSON manifests
        run: |
          python - <<'PY'
          import sys, glob, json
          manifests = (
              glob.glob('.claude-plugin/plugin.json')
              + glob.glob('**/plugin.json', recursive=True)
              + glob.glob('**/marketplace.json', recursive=True)
          )
          manifests = sorted(set(manifests))
          if not manifests:
              print("::error::no plugin.json / marketplace.json manifest found")
              sys.exit(1)
          bad = 0
          for f in manifests:
              try:
                  data = json.load(open(f, encoding='utf-8'))
              except Exception as e:
                  print(f"::error file={f}::invalid JSON: {e}")
                  bad += 1
                  continue
              # plugin.json must carry name + description
              if f.endswith('plugin.json'):
                  for key in ('name', 'description'):
                      if not data.get(key):
                          print(f"::error file={f}::manifest missing '{key}'")
                          bad += 1
              print(f"OK: {f}")
          sys.exit(1 if bad else 0)
          PY
      - name: Validate command frontmatter (name|description)
        run: |
          python - <<'PY'
          import sys, glob, yaml
          cmds = sorted(set(
              glob.glob('commands/**/*.md', recursive=True)
              + glob.glob('skills/**/SKILL.md', recursive=True)
              + glob.glob('SKILL.md')
          ))
          if not cmds:
              print("::error::no command markdown or SKILL.md found")
              sys.exit(1)
          bad = 0
          for path in cmds:
              text = open(path, encoding='utf-8').read()
              if not text.startswith('---'):
                  print(f"::error file={path}::missing YAML frontmatter")
                  bad += 1
                  continue
              fm = text.split('---', 2)[1]
              try:
                  data = yaml.safe_load(fm) or {}
              except Exception as e:
                  print(f"::error file={path}::invalid frontmatter YAML: {e}")
                  bad += 1
                  continue
              # a command/skill must at least describe itself
              if not (data.get('description') or data.get('name')):
                  print(f"::error file={path}::frontmatter needs 'description' or 'name'")
                  bad += 1
              print(f"OK: {path}")
          sys.exit(1 if bad else 0)
          PY

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run shellcheck on scripts
        run: |
          mapfile -t files < <(git ls-files '*.sh' 'bin/*')
          # keep only shell scripts among bin/* (by shebang)
          shell_files=()
          for f in "${files[@]}"; do
            case "$f" in
              *.sh) shell_files+=("$f") ;;
              *) head -1 "$f" 2>/dev/null | grep -qE '^#!.*(bash|sh)' && shell_files+=("$f") ;;
            esac
          done
          if [ ${#shell_files[@]} -eq 0 ]; then
            echo "No shell scripts; skipping shellcheck (gate stays green)."
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          printf '%s\n' "${shell_files[@]}"
          shellcheck "${shell_files[@]}"

  markdownlint:
    name: Markdown (lenient)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: markdownlint (non-blocking style, blocking parse)
        run: |
          mapfile -t md < <(git ls-files '*.md')
          if [ ${#md[@]} -eq 0 ]; then
            echo "No markdown files."
            exit 0
          fi
          for f in "${md[@]}"; do
            if [ ! -s "$f" ]; then echo "::error::empty markdown: $f"; exit 1; fi
          done
          npx --yes markdownlint-cli2 "**/*.md" "#node_modules" || \
            echo "::warning::markdownlint reported style issues (non-blocking)."

  ci-passed:
    name: CI passed
    if: always()
    needs: [validate-plugin, shellcheck, markdownlint]
    runs-on: ubuntu-latest
    steps:
      - name: Require every job to pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "::error::A required CI job did not succeed."
          echo "Results: ${{ join(needs.*.result, ' ') }}"
          exit 1
      - name: All gates green
        run: echo "All CI jobs passed."
